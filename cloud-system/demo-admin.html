<!doctype html><html lang="hi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DK Admin Preview</title><style>body{font-family:Arial;margin:0;background:#eef2f7;color:#172033}header{background:#111827;color:#fff;padding:18px}main{max-width:1100px;margin:24px auto;padding:0 14px}.card{background:#fff;padding:20px;border-radius:14px;box-shadow:0 6px 22px #0001}.login{max-width:420px;margin:60px auto}input,select,button{padding:11px;border-radius:8px;border:1px solid #cbd5e1;margin:6px}button{background:#2563eb;color:#fff;font-weight:700;cursor:pointer}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:15px 0}.stat{background:#fff;padding:16px;border-radius:12px}.stat b{font-size:28px}table{width:100%;border-collapse:collapse;background:#fff}th,td{padding:11px;border-bottom:1px solid #ddd;text-align:left}.hide{display:none}.note{background:#fffbeb;border:1px solid #f59e0b;padding:10px;border-radius:8px}@media(max-width:700px){.stats{grid-template-columns:repeat(2,1fr)}}</style></head><body><header><h2>DK Cloud Admin Dashboard - Preview</h2></header><main><section id="login" class="card login"><p class="note">Sirf demo preview. Real cloud data Supabase setup ke baad dikhega.</p><input id="id" value="admin" placeholder="Admin ID"><input id="pw" type="password" placeholder="Password"><button id="go">Open Dashboard</button><p>Admin ID: <b>admin</b> &nbsp; Password: <b>12345</b></p><p id="msg"></p></section><section id="dash" class="hide"><p class="note">Demo mode: yahan sample data dikh raha hai.</p><div class="stats"><div class="stat">Users<br><b>4</b></div><div class="stat">Apps<br><b>4</b></div><div class="stat">Sections<br><b>5</b></div><div class="stat">Records<br><b>5</b></div></div><div class="card"><input id="q" placeholder="Search"><select id="app"><option value="">All Apps</option><option>UA/UC</option><option>Kaizen</option><option>Rejection</option><option>File Store</option></select><button id="out">Logout</button><table><thead><tr><th>User</th><th>App</th><th>Unit</th><th>Barcode</th><th>Record</th></tr></thead><tbody id="rows"></tbody></table></div></section></main><script>const data=[['Rahul','UA/UC','KN5','UA001','Unsafe condition'],['Amit','Kaizen','KN12','KAI014','Pallet location idea'],['Suresh','Rejection','SJ Unit','REJ008','Incomplete welding'],['Neha','File Store','KN1','FS101','PDI file uploaded'],['Rahul','Kaizen','KN3','KAI011','Buffing paper bin']];const el=x=>document.getElementById(x);function draw(){let q=el('q').value.toLowerCase(),a=el('app').value;el('rows').innerHTML=data.filter(r=>(!a||r[1]==a)&&(!q||r.join(' ').toLowerCase().includes(q))).map(r=>'<tr>'+r.map(x=>'<td>'+x+'<\/td>').join('')+'<\/tr>').join('')}el('go').onclick=()=>{if(el('id').value==='admin'&&el('pw').value===String(12345)){el('login').className='hide';el('dash').className='';draw()}else el('msg').textContent='Wrong ID or password'};el('q').oninput=draw;el('app').onchange=draw;el('out').onclick=()=>location.reload();</script></body></html>
