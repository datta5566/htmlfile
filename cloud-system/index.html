<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DK User Apps</title>
  <link rel="stylesheet" href="portal.css">
</head>
<body>
  <div class="shell">
    <header class="top">
      <div class="brand"><h1>DK User Apps</h1><p>Link खोलें और सीधे काम करें — OTP या login नहीं</p></div>
      <div class="status" id="cloudStatus" data-type="info">Starting...</div>
    </header>
    <section class="portal" id="portalPanel">
      <aside class="side">
        <h3>Applications</h3>
        <div class="app-list" id="appButtons"></div>
        <div class="userbox">
          <label class="field">आपका नाम<input id="displayName" autocomplete="name" placeholder="Name"></label>
          <p id="syncDetails">Cloud sync शुरू हो रहा है...</p>
          <div class="buttons"><button class="btn" id="syncNowBtn" type="button">Save / Sync Now</button></div>
          <p class="small">Cloud records केवल Administrator देख सकता है।</p>
        </div>
      </aside>
      <main class="main">
        <div class="bar"><strong id="activeAppName">Application</strong><span>Automatic cloud saving</span></div>
        <iframe class="frame" id="appFrame" title="DK Application"></iframe>
      </main>
    </section>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <script src="portal.js"></script>
</body>
</html>
