<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Kaizen Converter</title><style>*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,#050816,#111827);color:#eef4ff;min-height:100vh}.wrap{max-width:1700px;margin:auto;padding:22px}.panel,.card{background:rgba(18,22,42,.8);border:1px solid rgba(255,255,255,.13);border-radius:22px;box-shadow:0 22px 55px #0007}.head{padding:22px;margin-bottom:14px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}.card{padding:16px}.input,button{width:100%;padding:13px;border-radius:14px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:#fff;font-size:15px}button{border:0;font-weight:900;cursor:pointer;background:linear-gradient(135deg,#7c3aed,#06b6d4);margin-top:8px}.good{background:linear-gradient(135deg,#10b981,#06b6d4)}.warn{background:linear-gradient(135deg,#f59e0b,#fb7185)}.danger{background:linear-gradient(135deg,#ef4444,#f97316)}.muted{color:#94a3b8}.catBox{display:none;margin-top:10px;grid-template-columns:repeat(3,1fr);gap:8px}.catBox.show{display:grid}.chip{width:auto;padding:8px 10px;border-radius:999px;background:#1f2a44;color:#dbeafe;border:1px solid rgba(255,255,255,.16);font-size:12px}.tablebox{overflow:auto;padding:14px}.highlight td{background:rgba(34,197,94,.20)!important}table{width:100%;min-width:1900px;border-collapse:collapse}th,td{padding:11px;border-bottom:1px solid rgba(255,255,255,.1);text-align:left;vertical-align:top}th{position:sticky;top:0;background:#24304d;color:#dbeafe;z-index:2;white-space:nowrap}td{background:rgba(255,255,255,.03)}td[contenteditable]{outline:1px dashed rgba(125,211,252,.25)}.status{padding:12px;color:#93c5fd;font-weight:800}@media(max-width:900px){.grid{grid-template-columns:1fr 1fr}}@media(max-width:600px){.grid{grid-template-columns:1fr}.catBox{grid-template-columns:1fr 1fr}}</style></head><body><div class='wrap'><div class='panel head'><h1>Kaizen To Microsoft Converter</h1><p class='muted'>Multiple Excel files convert • Category search • Save • Download</p></div><div class='grid'><div class='card'><h3>Upload Kaizen Files</h3><input id='excelFile' class='input' type='file' accept='.xlsx,.xls' multiple></div><div class='card searchCard'><h3>Search Record</h3><input id='searchBox' class='input' placeholder='Click for category / type search'><div id='catBox' class='catBox'></div></div><div class='card'><h3>Convert Data</h3><button class='good' onclick='convertFiles()'>Convert Kaizen Files</button></div><div class='card'><h3>Clear Table</h3><button class='danger' onclick='clearTable()'>Clear</button></div></div><div class='grid'><div class='card'><h3>Save Records</h3><button class='warn' onclick='saveData()'>Save Edited Data</button></div><div class='card'><h3>Download Excel</h3><button onclick='downloadExcel()'>Download Excel</button></div><div class='card'><h3>Show Saved Records</h3><button class='warn' onclick='showSaved()'>Show Records</button></div><div class='card'><h3>Delete Saved</h3><button class='danger' onclick='deleteSaved()'>Delete Saved Data</button></div></div><div class='panel tablebox'><table><thead><tr id='thead'></tr></thead><tbody id='tbody'></tbody></table><div id='status' class='status'>Ready...</div></div></div><script src='https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js'></script><script>const STORAGE='dk_kaizen_online_records_v4';const CATS=['PRODUCTIVITY','QUALITY','SAFETY','DELIVERY','COST','MORAL','5S','SYSTEM/DOCUMENTS'];const cols=[['slno','SL.NO'],['team','TEAM NAMES'],['kaizenNo','KAIZEN NO'],['ideaBy','KAIZEN IDEA BY'],['area','KAIZEN AREA'],['theme','KAIZEN THEME'],['description','KAIZEN DESCRIPTION'],['feasibility','FEASIBILITY'],['facilitator','FACILITATOR'],['benefit','AREA OF BENEFIT'],['before','BEFORE'],['category','KAIZEN CATEGORY'],['deployment','HORIZONTAL DEPLOYMENT'],['target','TARGET DATE'],['impl','IMPL.DATE'],['status','KAIZEN STATUS'],['physical','AVAILABLE PHYSICALLY'],['soft','SOFT COPY'],['help','KAIZEN DEPLOYMENT HELP']];let data=JSON.parse(localStorage.getItem(STORAGE)||'[]');function init(){thead.innerHTML=cols.map(c=>'<th>'+c[1]+'</th>').join('');catBox.innerHTML='<button class=chip onclick="filterCat(\'\')">ALL RECORDS</button>'+CATS.map(c=>'<button class=chip onclick="filterCat(\''+c+'\')">'+c+'</button>').join('');render()}function today(){return new Date().toLocaleDateString('en-IN')}function norm(v){return String(v||'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim()}function getCell(s,a){if(s[a]&&s[a].v!=null)return String(s[a].v).trim();try{let p=XLSX.utils.decode_cell(a);for(const m of s['!merges']||[]){if(p.r>=m.s.r&&p.r<=m.e.r&&p.c>=m.s.c&&p.c<=m.e.c){let top=XLSX.utils.encode_cell({r:m.s.r,c:m.s.c});if(s[top]&&s[top].v!=null)return String(s[top].v).trim()}}}catch(e){}return ''}function clean(v){return String(v||'').replace(/\r/g,'\n').replace(/[ \t]+/g,' ').replace(/\n+/g,' ').trim()}function stopClean(v,label){let x=clean(v).replace(label,'').replace(/^[\s:：/-]+/,'');return x.replace(/\b(BENEFITS?|PRODUCTIVITY|QUALITY|SAFETY|DELIVERY|COST|MORAL|5S|SYSTEM\s*\/?\s*DOCUMENTS|KAIZEN\s+STATUS|HORIZONTAL\s+DEPLOYMENT).*$/i,'').trim()}function tick(v){let r=String(v||'').trim();return /[üÜ✓✔☑√✅●]/.test(r)||['yes','y','true','ok','checked','check','tick','right','selected','1'].includes(norm(r))}function rows(sheet){if(!sheet['!ref'])return[];let range=XLSX.utils.decode_range(sheet['!ref']),out=[];for(let r=range.s.r;r<=range.e.r;r++){let row=[];for(let c=range.s.c;c<=range.e.c;c++)row.push(getCell(sheet,XLSX.utils.encode_cell({r,c})));out.push(row)}return out}function selectedCats(sheet){let aliases={PRODUCTIVITY:['productivity','productivity p'],QUALITY:['quality','quality q'],SAFETY:['safety','safety s'],DELIVERY:['delivery','delivery d'],COST:['cost','cost c'],MORAL:['moral','morale','moral m'],'5S':['5s'],'SYSTEM/DOCUMENTS':['system documents','system document','documents']};let found=[];function add(c){if(!found.includes(c))found.push(c)}rows(sheet).forEach(row=>{for(let c=0;c<row.length;c++){let n=norm(row[c]);CATS.forEach(cat=>{if(aliases[cat].some(a=>n.includes(a))){for(let k=c;k<=Math.min(row.length-1,c+4);k++)if(tick(row[k]))add(cat)}})}});return found.join(', ')}function makeRecord(sheet,file){let before=stopClean(getCell(sheet,'A24'),/description\s*\(\s*before\s*improvement\s*\)\s*:?/i);let benefit=stopClean(getCell(sheet,'A25'),/benefits?\s*:?/i);let cat=selectedCats(sheet);return{slno:data.length+1,team:getCell(sheet,'C7')||'Production',kaizenNo:getCell(sheet,'C3')||('KZ-'+String(data.length+1).padStart(3,'0')),ideaBy:getCell(sheet,'C8')||getCell(sheet,'C9')||'Operator',area:getCell(sheet,'C6')||'Shop Floor',theme:getCell(sheet,'C4')||'Safety',description:getCell(sheet,'C5')||'Improvement Activity',feasibility:getCell(sheet,'C10')||'High',facilitator:getCell(sheet,'C11')||'Supervisor',benefit:benefit||'Safety',before:before||'',category:cat||'',deployment:'Yes',target:today(),impl:today(),status:'Implemented',physical:'Yes',soft:'Yes',help:'Required',sourceFile:file.name}}function readFile(file){return new Promise((res,rej)=>{let r=new FileReader();r.onload=e=>{try{let wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});res({file,sheet:wb.Sheets[wb.SheetNames[0]]})}catch(err){rej(err)}};r.onerror=()=>rej(r.error);r.readAsArrayBuffer(file)})}async function convertFiles(){if(typeof XLSX==='undefined'){alert('Internet ON karo. Excel engine load nahi hua.');return}let files=[...excelFile.files];if(!files.length){alert('Select Excel File');return}let ok=0,fail=0;for(const f of files){try{let x=await readFile(f);data.push(makeRecord(x.sheet,x.file));ok++;status.textContent='Converted '+ok+'/'+files.length}catch(e){console.error(e);fail++}}render();status.textContent=ok+' Records Converted'+(fail?' | '+fail+' failed':'')}function render(){tbody.innerHTML='';data.forEach((r,i)=>{r.slno=i+1;let tr=document.createElement('tr');cols.forEach(c=>{let td=document.createElement('td');td.contentEditable='true';td.textContent=r[c[0]]||'';td.oninput=()=>{data[i][c[0]]=td.innerText.trim()};tr.appendChild(td)});tbody.appendChild(tr)});applyFilter()}function saveData(){localStorage.setItem(STORAGE,JSON.stringify(data));status.textContent='Data Saved Successfully'}function showSaved(){data=JSON.parse(localStorage.getItem(STORAGE)||'[]');render();status.textContent=data.length+' Saved Records Loaded'}function deleteSaved(){if(confirm('Saved data delete karna hai?')){data=[];localStorage.removeItem(STORAGE);render();status.textContent='Saved Data Deleted'}}function clearTable(){tbody.innerHTML='';status.textContent='Table Cleared. Saved data safe hai.'}function downloadExcel(){if(!data.length){alert('No Data');return}let exp=data.map((r,i)=>{let o={};cols.forEach(c=>o[c[1]]=c[0]==='slno'?i+1:r[c[0]]||'');return o});let ws=XLSX.utils.json_to_sheet(exp),wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Microsoft Format');XLSX.writeFile(wb,'Kaizen_Microsoft_Format.xlsx')}function filterCat(c){searchBox.value=c;applyFilter()}function applyFilter(){let v=norm(searchBox.value),cnt=0;document.querySelectorAll('#tbody tr').forEach(row=>{let match=!v||norm(row.innerText).includes(v);row.style.display=match?'':'none';row.classList.toggle('highlight',!!v&&match);if(match)cnt++});status.textContent=v?cnt+' record(s) highlighted':data.length+' Records Available'}searchBox.addEventListener('focus',()=>catBox.classList.add('show'));searchBox.addEventListener('click',()=>catBox.classList.add('show'));searchBox.addEventListener('keyup',applyFilter);document.addEventListener('click',e=>{if(!document.querySelector('.searchCard').contains(e.target))catBox.classList.remove('show')});window.onload=init;</script></body></html>
