name: Build DK PDI Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'DK_PDI_Android/**'
      - '.github/workflows/build-dk-pdi-apk.yml'

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.13'

      - name: Build debug APK
        working-directory: DK_PDI_Android
        run: gradle --no-daemon assembleDebug

      - name: Rename APK
        run: cp DK_PDI_Android/app/build/outputs/apk/debug/app-debug.apk DK_PDI_Scanner.apk

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: DK-PDI-Scanner-APK
          path: DK_PDI_Scanner.apk
          if-no-files-found: error
