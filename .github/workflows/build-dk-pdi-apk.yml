name: Build DK PDI Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'DK_PDI_Android/**'
      - '.github/workflows/build-dk-pdi-apk.yml'
  pull_request:
    paths:
      - 'DK_PDI_Android/**'
      - '.github/workflows/build-dk-pdi-apk.yml'

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Test sticker parsing logic
        run: |
          node --version
          node DK_PDI_Android/tests/sticker-parser.test.js
          node --check DK_PDI_Android/app/src/main/assets/app.js
          node --check DK_PDI_Android/app/src/main/assets/sticker-parser.js

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.13'
          cache-provider: basic

      - name: Lint and build debug APK
        working-directory: DK_PDI_Android
        run: gradle --no-daemon clean lintDebug assembleDebug

      - name: Validate APK package
        run: |
          APK="DK_PDI_Android/app/build/outputs/apk/debug/app-debug.apk"
          test -f "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK" | tee apk-badging.txt
          grep -q "package: name='com.dk.pdiscanner'" apk-badging.txt
          cp "$APK" DK_PDI_Scanner_v1.1.0.apk

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: DK-PDI-Scanner-APK
          path: DK_PDI_Scanner_v1.1.0.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DK-PDI-Lint-Report
          path: DK_PDI_Android/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
          retention-days: 14
