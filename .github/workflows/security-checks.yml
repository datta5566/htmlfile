name: Security checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify application files
        shell: bash
        run: |
          set -euo pipefail
          test -f index.html
          test -f ua-uc/index.html
          test -f kaizen/index.html
          test -f cloud-system/index.html
          test -f cloud-system/admin.html
          test -f cloud-system/portal.js
          test -f cloud-system/admin.js
          find . -name '*.html' -type f -print

      - name: Check cloud JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          node --check cloud-system/portal.js
          node --check cloud-system/admin.js
          node --check cloud-system/supabase-config.js

      - name: Scan source for security problems
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import sys

          files = [
              p for p in Path('.').rglob('*')
              if p.suffix in {'.html', '.js'} and '.git' not in p.parts
          ]

          blocking_checks = [
              ('insecure HTTP resource', re.compile(r'''(?:src|href)\s*=\s*["']http://''', re.I)),
              ('possible committed API key or token', re.compile(r'''(?:api[_-]?key|client[_-]?secret|private[_-]?key|access[_-]?token)\s*[:=]\s*["'][^"']{8,}''', re.I)),
              ('dynamic code execution', re.compile(r'''\beval\s*\(|new\s+Function\s*\(''')),
          ]

          warning_checks = [
              ('client-side password/PIN', re.compile(r'''LOGIN_PASSWORD|Default Password|type\s*=\s*["']password''', re.I)),
              ('browser localStorage', re.compile(r'''\blocalStorage\b''')),
          ]

          problems = []
          warnings = []
          for path in files:
              text = path.read_text(encoding='utf-8', errors='ignore')
              for label, pattern in blocking_checks:
                  if pattern.search(text):
                      problems.append(f'{path}: {label}')
              for label, pattern in warning_checks:
                  if pattern.search(text):
                      warnings.append(f'{path}: {label}')

          if warnings:
              print('Audit warnings:')
              print('\n'.join(warnings))
              print('See SECURITY.md and README.md. Client-side login is not server authentication.')

          if problems:
              print('Blocking security problems:')
              print('\n'.join(problems))
              sys.exit(1)

          print(f'Security scan passed for {len(files)} HTML/JavaScript files.')
          PY
